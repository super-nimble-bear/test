<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>핀테크 서비스 실습 페이지</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f7f6;
            color: #333;
            text-align: center;
            padding: 50px;
        }
        .container {
            background-color: #fff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: auto;
        }
        h1 {
            color: #0056b3;
        }
        .highlight {
            font-weight: bold;
            color: #d9534f;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>환영합니다! 핀테크 깃허브 실습</h1>
        <p>이 페이지는 GitHub 버전 관리 실습을 위한 <strong>샘플 웹페이지</strong>입니다.</p>
        
        <hr>

        <p>현재 버전: <span class="highlight">v1.0.0</span></p>
        <p>작성자: <span>정아람</span></p>

        <hr>

        <h3>오늘의 실습 목표</h3>
        <ul style="text-align: left;">
            <li>로컬 저장소 생성 (git init)</li>
            <li>파일 변경 사항 저장 (git commit)</li>
            <li>원격 저장소에 업로드 (git push)</li>
        </ul>
    </div>
</body>
</html>
